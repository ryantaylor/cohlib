name: Notify cohlib-rb

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cohlib-rb sync
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COHLIB_RB_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'ryantaylor',
              repo: 'cohlib-rb',
              event_type: 'cohlib-updated',
              client_payload: {
                sha: context.sha,
                ref: context.ref,
              },
            });
